<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>사랑의병원 감염관리 슈팅게임</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <section id="startScreen" class="overlay visible">
      <div class="panel">
        <div class="badge">Ansan Sarang Hospital</div>
        <h1>감염관리 슈팅게임</h1>
        <p class="sub">클린이와 버블이로 병균을 소독하세요</p>
        <form id="startForm" class="form">
          <label><span>부서명</span><input id="departmentInput" type="text" maxlength="20" placeholder="예: 감염관리실" /></label>
          <label><span>이름</span><input id="nameInput" type="text" maxlength="20" placeholder="예: 홍길동" /></label>
          <div class="buttonRow"><button id="startBtn" type="submit" class="primary">게임 시작</button></div>
        </form>
        <div class="guide">
          <strong>조작 방법</strong>
          <p>PC: ← → 또는 A D 이동</p>
          <p>모바일: 화면 하단을 좌우로 드래그</p>
        </div>
      </div>
    </section>

    <section id="gameOverScreen" class="overlay hidden">
      <div class="panel">
        <h2>게임 오버</h2>
        <p id="finalInfo" class="resultText"></p>
        <div class="buttonRow"><button id="restartBtn" type="button" class="primary">다시 시작</button></div>
      </div>
    </section>

    <header class="hud">
      <div>점수 <strong id="scoreText">0</strong></div>
      <div>체력 <strong id="hpText">5</strong></div>
      <div>웨이브 <strong id="waveText">1</strong></div>
      <div>무기 <strong id="weaponText">기본</strong></div>
    </header>

    <canvas id="gameCanvas" width="420" height="760"></canvas>

    <footer class="footer">
      <span id="playerInfo">플레이어 미입력</span>
      <span>남색 테마 · 웹 배포용</span>
    </footer>
  </div>
  <script src="./game.js"></script>
</body>
</html>

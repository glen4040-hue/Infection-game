<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>감염관리 게임</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="game">
  <header>
    점수 <span id="score">0</span> |
    체력 <span id="hp">3</span>
  </header>

  <canvas id="canvas" width="420" height="700"></canvas>

  <div class="controls">
    <button onclick="selectItem('mask')">마스크</button>
    <button onclick="selectItem('n95')">N95</button>
    <button onclick="selectItem('gown')">가운</button>
    <button onclick="selectItem('needle')">안전바늘</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
